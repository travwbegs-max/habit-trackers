<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habit Game RPG</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

<h1>Habit RPG ⚔️</h1>

<div class="profile">
  <div id="avatar">🧙</div>
  <button onclick="changeAvatar()">Change Avatar</button>
</div>

<div class="stats">
  <div>Level: <span id="level"></span></div>
  <div>XP: <span id="xp"></span> / <span id="xpNeeded"></span></div>
  <div>Gold: 🪙 <span id="gold"></span></div>
</div>

<div class="progress-bar"><div id="xpBar"></div></div>

<h2>Boss</h2>
<div id="boss"></div>

<h2>Your Habits</h2>
<div id="habits"></div>
<button onclick="addHabit()">+ Add Habit</button>

<h2>Weekly Progress</h2>
<div id="calendar"></div>

<h2>Achievements 🏅</h2>
<div id="achievements"></div>

<h2>Analytics 📊</h2>
<canvas id="chart" height="150"></canvas>

<h2>Save / Backup</h2>
<button onclick="exportData()">Export Save</button>
<input type="file" onchange="importData(event)">

<h2>Leaderboard 🏆</h2>
<div id="leaderboard"></div>

</div>

<script src="app.js"></script>
</body>
</html>
